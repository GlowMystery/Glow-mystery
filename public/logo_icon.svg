<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold Gradient for the Ring -->
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE5B4"/> <!-- Light Gold -->
      <stop offset="25%" stop-color="#D4AF37"/> <!-- Standard Gold -->
      <stop offset="50%" stop-color="#B8860B"/> <!-- Dark Gold -->
      <stop offset="75%" stop-color="#D4AF37"/> <!-- Standard Gold -->
      <stop offset="100%" stop-color="#FFE5B4"/> <!-- Light Gold -->
    </linearGradient>
    
    <!-- Gold Gradient for Text -->
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF2CC"/>
      <stop offset="30%" stop-color="#E5C100"/>
      <stop offset="70%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#FFF2CC"/>
    </linearGradient>
    
    <!-- Shadow for 3D effect -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="90" stroke="url(#goldRing)" stroke-width="5" fill="none" filter="url(#shadow)"/>
  
  <!-- Inner Detail (Accessory ring segment) -->
  <path d="M 40 100 A 60 60 0 0 1 160 100" stroke="url(#goldRing)" stroke-width="2" fill="none" opacity="0.6" filter="url(#shadow)"/>

  <!-- Text G -->
  <text x="75" y="115" font-family="'Cinzel', serif" font-size="100" fill="url(#goldText)" font-weight="bold" text-anchor="middle" filter="url(#shadow)">G</text>
  
  <!-- Text M (Interwoven) -->
  <text x="125" y="115" font-family="'Cinzel', serif" font-size="100" fill="url(#goldText)" font-weight="bold" text-anchor="middle" filter="url(#shadow)">M</text>
</svg>
